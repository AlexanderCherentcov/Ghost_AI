name: Deploy

# Vercel и Railway деплоятся автоматически через свою GitHub-интеграцию.
# Этот workflow только для Railway CLI (бэкенд + бот).
# Vercel подключается напрямую в dashboard — не требует Actions.

on:
  push:
    branches: [master]

jobs:
  # ========================
  # Deploy Backend → Railway
  # ========================
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend
        working-directory: backend
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ========================
  # Deploy Bot → Railway
  # ========================
  deploy-bot:
    name: Deploy Bot (Railway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Bot
        working-directory: bot
        run: railway up --service bot --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
