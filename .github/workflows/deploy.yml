name: Deploy to VPS

# Автодеплой backend + bot на сервер 178.217.101.193
# Срабатывает при пуше в master если изменились backend/bot/infra
# Также можно запустить вручную из GitHub Actions → "Run workflow"

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'bot/**'
      - 'infra/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy backend + bot via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            APP_DIR="${{ secrets.APP_DIR }}"

            echo "=== Ghost AI Deploy ==="
            echo "📦 Pulling latest code..."
            git -C "$APP_DIR" pull --ff-only

            echo "🔨 Building containers..."
            cd "$APP_DIR/infra"
            docker compose -f docker-compose.prod.yml build --no-cache api worker bot

            echo "🔄 Restarting services (postgres/redis не перезапускаются)..."
            docker compose -f docker-compose.prod.yml up -d --no-deps api worker bot

            echo "⏳ Waiting 15s for API to start..."
            sleep 15

            echo "🏥 Health check..."
            curl -sf http://127.0.0.1:8000/health || {
              echo "❌ Health check failed — показываю логи:"
              docker compose -f docker-compose.prod.yml logs --tail=60 api
              exit 1
            }

            echo ""
            echo "✅ Deployed successfully!"
            docker compose -f docker-compose.prod.yml ps
