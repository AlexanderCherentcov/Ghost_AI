name: Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ========================
  # Deploy Backend → Railway
  # ========================
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_BACKEND }}
        run: railway up --service backend --detach

  # ========================
  # Deploy Bot → Railway
  # ========================
  deploy-bot:
    name: Deploy Bot (Railway)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Bot
        working-directory: bot
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_BOT }}
        run: railway up --service bot --detach

  # ========================
  # Deploy Frontend → Vercel
  # ========================
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy Frontend
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
        run: vercel deploy --prod --token=$VERCEL_TOKEN

  # ========================
  # Deploy Web (Next.js) → Vercel
  # ========================
  deploy-web:
    name: Deploy Web Next.js (Vercel)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy Web
        working-directory: web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: vercel deploy --prod --token=$VERCEL_TOKEN
