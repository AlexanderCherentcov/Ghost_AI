version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ghost_ai
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ghostpass123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'ghost', '-d', 'ghost_ai']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ghost_net

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redispass123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ghost_net

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.scripts.seed &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "
    volumes:
      - uploads:/app/uploads
    networks:
      - ghost_net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m arq app.workers.tasks.WorkerSettings
    volumes:
      - uploads:/app/uploads
    networks:
      - ghost_net

  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      - api
    networks:
      - ghost_net

  miniapp:
    build:
      context: ../miniapp
      dockerfile: Dockerfile
    restart: always
    volumes:
      - miniapp_dist:/var/www/miniapp:ro
    networks:
      - ghost_net

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      API_URL: http://api:8000
    networks:
      - ghost_net

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/letsencrypt:ro
      - miniapp_dist:/var/www/miniapp:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - api
      - web
    networks:
      - ghost_net

volumes:
  postgres_data:
  redis_data:
  uploads:
  miniapp_dist:

networks:
  ghost_net:
    driver: bridge
