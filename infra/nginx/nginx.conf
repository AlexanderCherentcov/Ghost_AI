# ========================
# Rate limiting zones (DoS protection)
# ========================

# General API: 30 req/s per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Auth endpoints: 5 req/min per IP (brute-force protection)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# Chat/SSE: 10 req/min per IP
limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/m;

# Image generation: 5 req/min per IP (heavy resource)
limit_req_zone $binary_remote_addr zone=image_limit:10m rate=5r/m;

# Static assets: 100 req/s per IP
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=100r/s;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ========================
# Upstream backends
# ========================

upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream web_backend {
    server web:3000;
    keepalive 16;
}

# ========================
# HTTP → HTTPS redirect
# ========================
server {
    listen 80;
    server_name ghostai.ru www.ghostai.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ========================
# HTTPS main server
# ========================
server {
    listen 443 ssl http2;
    server_name ghostai.ru www.ghostai.ru;

    ssl_certificate     /etc/letsencrypt/live/ghostai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ghostai.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 100m;

    # Max simultaneous connections per IP
    limit_conn conn_limit 50;

    # ========================
    # Block common attack paths
    # ========================
    location ~* \.(php|asp|aspx|jsp|cgi)$ { return 404; }
    location ~* /(\.git|\.env|\.htaccess|wp-admin|phpMyAdmin|xmlrpc) { return 404; }

    # ========================
    # Static uploads
    # ========================
    location /uploads/ {
        limit_req zone=static_limit burst=50 nodelay;
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ========================
    # Mini App (static React)
    # ========================
    location /app/ {
        limit_req zone=static_limit burst=50 nodelay;
        alias /var/www/miniapp/;
        try_files $uri $uri/ /app/index.html;
        add_header Cache-Control "no-cache";
    }

    # ========================
    # Auth endpoints (strict — brute-force protection)
    # ========================
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================
    # Chat / SSE streaming
    # ========================
    location /api/chat/send {
        limit_req zone=chat_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ========================
    # Image generation (heavy, strict)
    # ========================
    location /api/image/ {
        limit_req zone=image_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ========================
    # General API
    # ========================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ========================
    # Web (Next.js)
    # ========================
    location / {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
