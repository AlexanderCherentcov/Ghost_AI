# ============================================================
# Ghost AI — Production compose (backend + bot only)
# НЕ запускает nginx — чтобы не конфликтовать с X-ray / WireGuard
# API доступен на порту 8000 хоста, можно проксировать через
# существующий nginx/X-ray на сервере
# ============================================================
version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ghost_ai
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'ghost', '-d', 'ghost_ai']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ghost_net

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ghost_net

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    ports:
      - '127.0.0.1:8000:8000'   # слушает только localhost — снаружи через nginx сервера
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.scripts.seed &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "
    volumes:
      - uploads:/app/uploads
    networks:
      - ghost_net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m arq app.workers.tasks.WorkerSettings
    volumes:
      - uploads:/app/uploads
    networks:
      - ghost_net

  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ghost_net

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  ghost_net:
    driver: bridge
